<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿アプリ（クラウド版）</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// 🔥 あなたの設定に置き換える
const firebaseConfig = {
    apiKey: "AIzaSyB9Phxm6u2o8z-ea7qAJqyqj9zTd1R1gAI",
    authDomain: "k2-kakeibo.firebaseapp.com",
    projectId: "k2-kakeibo",
    storageBucket: "k2-kakeibo.firebasestorage.app",
    messagingSenderId: "750885231235",
    appId: "1:750885231235:web:96c9a3a2366b25bf7159b6",
    measurementId: "G-L67LWYN5LF"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user = null;

// ログイン状態監視
onAuthStateChanged(auth, (u) => {
  if(u){
    user = u;
    document.getElementById("loginArea").style.display="none";
    document.getElementById("home").style.display="block";
  }
});

// ログイン
window.login = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// ログアウト
window.logout = function(){
  signOut(auth);
  location.reload();
};

// データ取得
async function getData(){
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : {};
}

// データ保存
async function saveData(data){
  const ref = doc(db, "users", user.uid);
  await setDoc(ref, data);
}

// 今日キー
function todayKey(){
  let d = new Date();
  return d.toISOString().split("T")[0];
}

// 保存（予定）
window.savePlan = async function(){
  let d = await getData();
  let k = todayKey();
  d[k] = d[k] || {};
  d[k].plan = {
    amount: planAmount.value,
    purpose: planPurpose.value,
    category: planCategory.value
  };
  await saveData(d);
  alert("保存しました");
};

// 保存（結果）
window.saveResult = async function(){
  let d = await getData();
  let k = todayKey();
  d[k] = d[k] || {};
  d[k].result = {
    amount: resultAmount.value,
    purpose: resultPurpose.value,
    category: resultCategory.value,
    reflection: reflection.value
  };
  await saveData(d);
  alert("保存しました");
};

// 収入
window.saveIncome = async function(){
  let d = await getData();
  let k = incomeMonth.value;
  d[k] = d[k] || {};
  d[k].income = d[k].income || [];
  d[k].income.push({
    amount: incomeAmount.value,
    type: incomeType.value
  });
  await saveData(d);
  alert("保存しました");
};

</script>

<style>
body { font-family: sans-serif; background:#f5f5f5; margin:0; }
.container { padding:10px; max-width: 600px; margin: auto; }
.card { background:white; border-radius:12px; padding:15px; margin:10px 0; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
button { width:100%; padding:12px; margin:5px 0; border:none; border-radius:8px; background:#4CAF50; color:white; }
</style>
</head>

<body>
<div class="container">

<h2>家計簿（クラウド版）</h2>

<!-- ログイン -->
<div id="loginArea" class="card">
<button onclick="login()">Googleでログイン</button>
</div>

<!-- ホーム -->
<div id="home" class="card" style="display:none;">
<button onclick="savePlan()">支出予定保存</button>
<button onclick="saveResult()">支出結果保存</button>
<button onclick="saveIncome()">収入保存</button>
<button onclick="logout()">ログアウト</button>
</div>

<!-- 入力 -->
<input id="planAmount" placeholder="予定金額">
<input id="planPurpose" placeholder="用途">
<select id="planCategory">
<option>園芸</option><option>遊興</option><option>家計</option><option>その他</option>
</select>

<input id="resultAmount" placeholder="結果金額">
<input id="resultPurpose" placeholder="用途">
<select id="resultCategory">
<option>園芸</option><option>遊興</option><option>家計</option><option>その他</option>
</select>
<textarea id="reflection"></textarea>

<input id="incomeMonth" type="month">
<input id="incomeAmount" placeholder="収入">
<select id="incomeType">
<option>給与</option><option>副業</option>
</select>

</div>
</body>
</html>
