<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿アプリ（資産管理・同期修正版）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: sans-serif; background:#f5f5f5; margin:0; }
.container { padding:10px; max-width: 600px; margin: auto; }
.card { background:white; border-radius:12px; padding:15px; margin:10px 0; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
button { width:100%; padding:12px; margin:5px 0; border:none; border-radius:8px; background:#4CAF50; color:white; font-size: 16px; cursor: pointer; }
button:hover { background:#45a049; }
input, select, textarea { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; box-sizing: border-box; font-size: 16px; }
.hidden { display:none; }
.summary-area { margin-bottom: 15px; padding: 15px; background: #e3f2fd; border-radius: 8px; text-align: left; }
.asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 14px; margin-top: 10px; }
.asset-item { background: rgba(255,255,255,0.7); padding: 8px; border-radius: 6px; border: 1px solid #d1e9ff; }
.history-item { border-bottom: 1px solid #eee; padding: 10px 0; }
</style>
</head>
<body>
<div class="container">
<h2 id="mainTitle">家計簿アプリ</h2>

<div id="home" class="card">
  <div class="auth-area" style="text-align:center; border-bottom:1px solid #eee; padding-bottom:15px; margin-bottom:15px;">
    <div id="authStatus" style="margin-bottom:10px; font-weight:bold; color:#757575;">接続中...</div>
    <button id="loginBtn" onclick="login()" class="hidden" style="background:#4285F4;">Googleでログイン</button>
    <button id="logoutBtn" onclick="logout()" class="hidden" style="background:#f44336;">ログアウト</button>
  </div>

  <div id="homeSummary" class="summary-area">最新データを取得しています...</div>

<button onclick="show('plan')">今日の支出予定</button>
<button onclick="show('result')">本日の支出結果</button>
<button onclick="show('income')">収入入力</button>
<button onclick="show('assetStatus')">日付別 残高確認</button>
<button onclick="show('assetAdjust')">残高修正（金額確定）</button>
<button onclick="show('monthly')">月の集計</button>
<button onclick="show('yearly')">年の集計</button>
<button onclick="show('history')">履歴一覧</button>
<button onclick="show('editDay')">日付編集</button>
<button onclick="exportCSV()" style="background:#2196F3;">CSV出力</button>
</div>

<!-- 資産・残高確認 -->
<div id="assetStatus" class="card hidden">
  <h3>日付指定の残高確認</h3>
  <input type="date" id="checkDate" onchange="updateAssetDisplay()">
  <div id="assetResult" class="summary-area"></div>
  <button onclick="back()" style="background:#757575;">戻る</button>
</div>

<!-- 残高修正 -->
<div id="assetAdjust" class="card hidden">
  <h3>残高修正</h3>
  <p style="font-size:12px; color:#666;">指定日の「最終残高」を確定し、新たな基準にします。</p>
  <input type="date" id="adjustDate">
  <select id="adjustAsset"></select>
  <input type="number" id="adjustAmount" placeholder="修正後の金額">
  <button id="adjustSaveBtn" onclick="saveAdjustment()" style="background:#FF9800;">保存する</button>
  <button onclick="back()" style="background:#757575;">戻る</button>
</div>

<!-- 支出予定 -->
<div id="plan" class="card hidden">
<h3>支出予定</h3>
<div id="planDate" style="margin-bottom:10px; font-weight:bold;"></div>
<input type="number" id="planAmount" placeholder="金額"><input type="text" id="planPurpose" placeholder="用途">
<select id="planAsset"></select><select id="planCategory"></select>
<button onclick="savePlan()">保存</button>
<button onclick="back()" style="background:#757575;">戻る</button>
</div>

<!-- 支出結果 -->
<div id="result" class="card hidden">
<h3>支出結果</h3>
<div id="resultDate" style="margin-bottom:10px; font-weight:bold;"></div>
<input type="number" id="resultAmount" placeholder="金額"><input type="text" id="resultPurpose" placeholder="用途">
<select id="resultAsset"></select><select id="resultCategory"></select>
<textarea id="reflection" placeholder="振り返り"></textarea>
<button onclick="saveResult()">保存</button>
<button onclick="back()" style="background:#757575;">戻る</button>
</div>

<!-- 収入入力 -->
<div id="income" class="card hidden">
<h3>収入入力</h3>
<input type="date" id="incomeDate">
<input type="number" id="incomeAmount" placeholder="金額">
<select id="incomeAsset"></select>
<select id="incomeType"><option>給与</option><option>臨時</option><option>年金</option><option>副業</option><option>その他</option></select>
<button onclick="saveIncome()">保存</button>
<button onclick="back()" style="background:#757575;">戻る</button>
</div>

<div id="monthly" class="card hidden"><h3>月別集計</h3><input type="month" id="monthlyMonth"><canvas id="chart"></canvas><button onclick="back()" style="background:#757575;">戻る</button></div>
<div id="yearly" class="card hidden"><h3>年別集計</h3><input type="number" id="yearlyYear" placeholder="2026"><button onclick="back()" style="background:#757575;">戻る</button></div>
<div id="history" class="card hidden"><h3>履歴一覧</h3><div id="historyList"></div><button onclick="back()" style="background:#757575;">戻る</button></div>
<div id="editDay" class="card hidden"><h3>日付編集</h3><input type="date" id="editDate"><div id="editArea"></div><button onclick="back()" style="background:#757575;">戻る</button></div>
</div>

<script>
const ASSETS = ['現金', '現金預金', '東邦７７７', '東邦市役所', '東邦けやき', 'Sony', 'PayPay', 'PayPayBank1', 'PayPayBank2', 'Mercari'];
const CATEGORIES = ['食費', '日用品', '家計', '園芸', '遊興', 'ガソリン〈エネオス〉', 'クレジット〈東邦〉', 'クレジット〈PayPay〉', 'その他'];

const firebaseConfig = {
    apiKey: "AIzaSyB9Phxm6u2o8z-ea7qAJqyqj9zTd1R1gAI",
    authDomain: "k2-kakeibo.firebaseapp.com",
    projectId: "k2-kakeibo",
    storageBucket: "k2-kakeibo.firebasestorage.app",
    messagingSenderId: "750885231235",
    appId: "1:750885231235:web:96c9a3a2366b25bf7159b6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let cachedData = {}; 

function initSelectors() {
  ['planAsset', 'resultAsset', 'incomeAsset', 'adjustAsset'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.innerHTML = ASSETS.map(a => `<option value="${a}">${a}</option>`).join('');
  });
  ['planCategory', 'resultCategory'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
  });
}
initSelectors();

auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authStatus').innerText = `${user.displayName} さん`;
    document.getElementById('loginBtn').classList.add('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    // 重要：ログイン直後に最新データを取得
    await loadDataFromFirebase();
  } else {
    currentUser = null; cachedData = {};
    document.getElementById('authStatus').innerText = "未ログイン";
    document.getElementById('loginBtn').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.add('hidden');
  }
  updateHomeSummary();
});

async function loadDataFromFirebase() {
  if (!currentUser) return;
  try {
    const doc = await db.collection('kakeibo_data').doc(currentUser.uid).get();
    if (doc.exists) {
      cachedData = doc.data().records || {};
    }
  } catch (e) { console.error("Load Error:", e); }
}

async function saveData(d){ 
  if (!currentUser) return alert("ログインが必要です");
  cachedData = d; 
  try {
    // マージではなく、recordsフィールドを最新のdで完全に置き換える
    await db.collection('kakeibo_data').doc(currentUser.uid).set({ records: d });
    updateHomeSummary();
  } catch (e) { alert("保存に失敗しました"); }
}

function calculateBalances(targetDateStr) {
  let balances = {};
  ASSETS.forEach(a => balances[a] = 0);
  const sortedKeys = Object.keys(cachedData).sort();
  for (let dateKey of sortedKeys) {
    if (dateKey > targetDateStr) break;
    let dayData = cachedData[dateKey];
    if (dayData.adjust) {
      Object.keys(dayData.adjust).forEach(asset => balances[asset] = Number(dayData.adjust[asset]));
    }
    if (dayData.income) {
      dayData.income.forEach(inc => { if (balances[inc.asset] !== undefined) balances[inc.asset] += Number(inc.amount); });
    }
    if (dayData.result) {
      let results = Array.isArray(dayData.result) ? dayData.result : [dayData.result];
      results.forEach(res => { if (balances[res.asset] !== undefined) balances[res.asset] -= Number(res.amount); });
    }
  }
  return balances;
}

function updateHomeSummary() {
  const today = new Date().toISOString().split('T')[0];
  const bals = calculateBalances(today);
  const total = Object.values(bals).reduce((a, b) => a + b, 0);
  let html = `<div style="font-size:18px; font-weight:bold; color:#1565c0; border-bottom:2px solid #1565c0; padding-bottom:5px; margin-bottom:10px;">現在の総資産: ${total.toLocaleString()}円</div><div class="asset-grid">`;
  ASSETS.forEach(a => { html += `<div class="asset-item">${a}<br><strong>${bals[a].toLocaleString()}円</strong></div>`; });
  html += `</div>`;
  document.getElementById('homeSummary').innerHTML = html;
}

function updateAssetDisplay() {
  const date = document.getElementById('checkDate').value;
  if(!date) return;
  const bals = calculateBalances(date);
  const total = Object.values(bals).reduce((a, b) => a + b, 0);
  let html = `<h4>${date} 時点の残高</h4><div class="asset-grid">`;
  ASSETS.forEach(a => { html += `<div class="asset-item">${a}<br><strong>${bals[a].toLocaleString()}円</strong></div>`; });
  html += `</div><div style="margin-top:15px; font-weight:bold; font-size:18px;">合計: ${total.toLocaleString()}円</div>`;
  document.getElementById('assetResult').innerHTML = html;
}

async function saveAdjustment() {
  const date = document.getElementById('adjustDate').value;
  const asset = document.getElementById('adjustAsset').value;
  const amt = document.getElementById('adjustAmount').value;
  if(!date || amt === '') return alert('日付と金額を入力してください');
  
  const btn = document.getElementById('adjustSaveBtn');
  btn.disabled = true; btn.innerText = "保存中...";

  // 既存データを壊さないようクローンを作成
  let d = JSON.parse(JSON.stringify(cachedData));
  if(!d[date]) d[date] = {};
  if(!d[date].adjust) d[date].adjust = {};
  d[date].adjust[asset] = Number(amt);
  
  await saveData(d);
  
  btn.disabled = false; btn.innerText = "保存する";
  alert('残高を更新しました');
  document.getElementById('adjustAmount').value = '';
}

function login() { auth.signInWithPopup(provider); }
function logout() { auth.signOut().then(() => location.reload()); }

function show(id){ 
  document.querySelectorAll('.card').forEach(d => d.classList.add('hidden')); 
  document.getElementById(id).classList.remove('hidden'); 
  if(id === 'home') updateHomeSummary();
  if(id === 'assetStatus') { document.getElementById('checkDate').value = new Date().toISOString().split('T')[0]; updateAssetDisplay(); }
  if(id === 'assetAdjust') document.getElementById('adjustDate').value = new Date().toISOString().split('T')[0];
  if(id === 'plan') setDate('planDate');
  if(id === 'result') setDate('resultDate');
  if(id === 'income') document.getElementById('incomeDate').value = new Date().toISOString().split('T')[0];
  if(id === 'history') loadHistory();
}

function back(){ show('home'); }
function setDate(id){ document.getElementById(id).innerText = new Date().toLocaleDateString('ja-JP'); }
function todayKey(){ return new Date().toISOString().split('T')[0]; }

async function savePlan(){ 
  let d = JSON.parse(JSON.stringify(cachedData)), k = todayKey(); 
  d[k] = d[k] || {}; d[k].plan = d[k].plan || [];
  d[k].plan.push({ amount: document.getElementById('planAmount').value, purpose: document.getElementById('planPurpose').value, category: document.getElementById('planCategory').value, asset: document.getElementById('planAsset').value }); 
  await saveData(d); alert('保存しました');
}

async function saveResult(){ 
  let d = JSON.parse(JSON.stringify(cachedData)), k = todayKey(); 
  d[k] = d[k] || {}; d[k].result = d[k].result || [];
  d[k].result.push({ amount: document.getElementById('resultAmount').value, purpose: document.getElementById('resultPurpose').value, category: document.getElementById('resultCategory').value, asset: document.getElementById('resultAsset').value, reflection: document.getElementById('reflection').value }); 
  await saveData(d); alert('保存しました');
}

async function saveIncome(){ 
  let d = JSON.parse(JSON.stringify(cachedData)), k = document.getElementById('incomeDate').value; 
  if(!k) return alert('日付を選択してください');
  d[k] = d[k] || {}; d[k].income = d[k].income || []; 
  d[k].income.push({amount: document.getElementById('incomeAmount').value, type: document.getElementById('incomeType').value, asset: document.getElementById('incomeAsset').value}); 
  await saveData(d); alert('保存しました');
}

function loadHistory(){
  let d = cachedData, html = '';
  let keys = Object.keys(d).sort((a,b) => b.localeCompare(a));
  keys.forEach(k => {
    let day = d[k], items = [];
    if(day.adjust) Object.keys(day.adjust).forEach(a => items.push(`<span style="color:#FF9800;">[修正] ${a}: ${day.adjust[a].toLocaleString()}円</span>`));
    if(day.income) day.income.forEach(i => items.push(`[収入] ${i.amount}円 (${i.asset})`));
    if(day.result) day.result.forEach(r => items.push(`[支出] ${r.amount}円 (${r.asset})`));
    if(items.length > 0) html += `<div class="history-item"><strong>${k}</strong><br>${items.join('<br>')}</div>`;
  });
  document.getElementById('historyList').innerHTML = html || 'データなし';
}

function exportCSV(){
  let d = cachedData, rows = [['日付','種別','金額','資産項目']];
  Object.keys(d).sort().forEach(k => {
    if(d[k].adjust) Object.keys(d[k].adjust).forEach(a => rows.push([k,'修正',d[k].adjust[a],a]));
    if(d[k].income) d[k].income.forEach(i => rows.push([k,'収入',i.amount,i.asset]));
    if(d[k].result) d[k].result.forEach(r => rows.push([k,'支出',r.amount,r.asset]));
  });
  let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')], {type:'text/csv'})); a.download='kakeibo.csv'; a.click();
}
</script>
</body>
</html>
