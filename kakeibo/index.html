<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿アプリ（Firebase版）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; background:#f5f5f5; margin:0; }
.container { padding:10px; max-width: 600px; margin: auto; }
.card { background:white; border-radius:12px; padding:15px; margin:10px 0; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
button { width:100%; padding:12px; margin:5px 0; border:none; border-radius:8px; background:#4CAF50; color:white; }
.hidden { display:none; }
</style>
</head>

<body>
<div class="container">
<h2>家計簿アプリ（クラウド同期）</h2>

<div id="loginArea" class="card">
<button onclick="login()">Googleでログイン</button>
</div>

<div id="home" class="card hidden">
<button onclick="show('plan')">支出予定</button>
<button onclick="show('result')">支出結果</button>
<button onclick="show('monthly')">月集計</button>
<button onclick="logout()">ログアウト</button>
</div>

<div id="plan" class="card hidden">
<input type="number" id="planAmount" placeholder="金額">
<input type="text" id="planPurpose" placeholder="用途">
<select id="planCategory">
<option>園芸</option><option>遊興</option><option>家計</option><option>その他</option>
</select>
<button onclick="savePlan()">保存</button>
</div>

<div id="result" class="card hidden">
<input type="number" id="resultAmount" placeholder="金額">
<input type="text" id="resultPurpose" placeholder="用途">
<select id="resultCategory">
<option>園芸</option><option>遊興</option><option>家計</option><option>その他</option>
</select>
<button onclick="saveResult()">保存</button>
</div>

<div id="monthly" class="card hidden">
<input type="month" id="monthlyMonth">
<button onclick="calcMonthly()">表示</button>
<canvas id="chart"></canvas>
<div id="monthlyResult"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔴ここを自分のFirebaseに置き換える
const firebaseConfig = {
    apiKey: "AIzaSyB9Phxm6u2o8z-ea7qAJqyqj9zTd1R1gAI",
    authDomain: "k2-kakeibo.firebaseapp.com",
    projectId: "k2-kakeibo",
    storageBucket: "k2-kakeibo.firebasestorage.app",
    messagingSenderId: "750885231235",
    appId: "1:750885231235:web:96c9a3a2366b25bf7159b6",
    measurementId: "G-L67LWYN5LF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId = null;
let data = {};
let chart;

// ログイン
window.login = async function(){
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  userId = result.user.uid;
};

// ログアウト
window.logout = function(){
  signOut(auth);
};

// ログイン状態監視
onAuthStateChanged(auth, async (user) => {
  if(user){
    userId = user.uid;
    document.getElementById("loginArea").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
    await loadData();
  } else {
    document.getElementById("loginArea").classList.remove("hidden");
    document.getElementById("home").classList.add("hidden");
  }
});

// Firestoreから読み込み
async function loadData(){
  const ref = doc(db, "kakeibo", userId);
  const snap = await getDoc(ref);
  data = snap.exists() ? snap.data() : {};
}

// Firestoreへ保存
async function saveData(){
  await setDoc(doc(db, "kakeibo", userId), data);
}

// 今日キー
function todayKey(){
  let d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}

// 画面切替
window.show = function(id){
  document.querySelectorAll('.card').forEach(d=>d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
};

// 保存
window.savePlan = async function(){
  let k = todayKey();
  data[k] = data[k] || {};
  data[k].plan = {
    amount: planAmount.value,
    purpose: planPurpose.value,
    category: planCategory.value
  };
  await saveData();
  alert("保存");
};

window.saveResult = async function(){
  let k = todayKey();
  data[k] = data[k] || {};
  data[k].result = {
    amount: resultAmount.value,
    purpose: resultPurpose.value,
    category: resultCategory.value
  };
  await saveData();
  alert("保存");
};

// 月集計
window.calcMonthly = function(){
  let m = monthlyMonth.value;
  let cat = {"園芸":0,"遊興":0,"家計":0,"その他":0};
  let total=0;

  for(let k in data){
    if(k.startsWith(m) && data[k].result){
      let r = data[k].result;
      total += Number(r.amount||0);
      cat[r.category]+=Number(r.amount||0);
    }
  }

  monthlyResult.innerText = "合計:"+total;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
  });
};

</script>
</body>
</html>
